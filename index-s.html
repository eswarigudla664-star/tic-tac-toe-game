<!DOCTYPE html>
<html>

<head>
    <title>Snake Game</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: black;
        }
        
        canvas {
            background: #111;
            border: 3px solid white;
        }
    </style>
</head>

<body>

    <canvas id="game" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        let snake = [{
            x: 200,
            y: 200
        }];
        let food = {
            x: 100,
            y: 100
        };

        let dx = 20;
        let dy = 0;

        function draw() {

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, 400, 400);

            ctx.fillStyle = "lime";

            snake.forEach(part => {
                ctx.fillRect(part.x, part.y, 20, 20);
            });

            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, 20, 20);

            let head = {
                x: snake[0].x + dx,
                y: snake[0].y + dy
            };

            snake.unshift(head);

            if (head.x == food.x && head.y == food.y) {

                food = {
                    x: Math.floor(Math.random() * 20) * 20,
                    y: Math.floor(Math.random() * 20) * 20
                };

            } else {
                snake.pop();
            }

            if (head.x < 0 || head.y < 0 || head.x >= 400 || head.y >= 400) {
                alert("Game Over");
                snake = [{
                    x: 200,
                    y: 200
                }];
            }
        }

        document.addEventListener("keydown", (e) => {

            if (e.key == "ArrowUp") {
                dx = 0;
                dy = -20;
            }

            if (e.key == "ArrowDown") {
                dx = 0;
                dy = 20;
            }

            if (e.key == "ArrowLeft") {
                dx = -20;
                dy = 0;
            }

            if (e.key == "ArrowRight") {
                dx = 20;
                dy = 0;
            }

        });

        setInterval(draw, 100);
    </script>
</body>

</html>
