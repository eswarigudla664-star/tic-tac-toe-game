<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Data Analytics Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 20px;
        }
        
        h1 {
            text-align: center;
        }
        
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        
        button,
        input {
            padding: 8px;
            margin: 5px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .card {
            background: #eaeaea;
            padding: 15px;
            border-radius: 10px;
            width: 150px;
            text-align: center;
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .chart-box {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 5px gray;
        }
        
        canvas {
            width: 100% !important;
            height: 300px !important;
        }
        
        .dark {
            background: #222;
            color: white;
        }
        
        .dark .chart-box,
        .dark .card {
            background: #333;
        }
    </style>
</head>

<body>

    <h1>Data Analytics Dashboard</h1>

    <div class="container">

        <div class="controls">

            <!-- Feature 1 -->
            <input type="file" id="fileInput">

            <!-- Feature 2 -->
            <input type="text" id="searchBox" placeholder="Search Data">

            <!-- Feature 3 -->
            <button onclick="sortData()">Sort A-Z</button>

            <!-- Feature 4 -->
            <button onclick="toggleDark()">Dark Mode</button>

            <!-- Feature 5 -->
            <button onclick="resetData()">Reset</button>

        </div>

        <!-- Feature 6 Statistics -->

        <div class="stats">

            <div class="card">
                <h3>Total</h3>
                <p id="totalRows">0</p>
            </div>

            <div class="card">
                <h3>Maximum</h3>
                <p id="maxValue">0</p>
            </div>

            <div class="card">
                <h3>Minimum</h3>
                <p id="minValue">0</p>
            </div>

            <div class="card">
                <h3>Average</h3>
                <p id="avgValue">0</p>
            </div>

        </div>

        <!-- Feature 7-10 Graphs -->

        <div class="chart-grid">

            <div class="chart-box">
                <canvas id="barChart"></canvas>
            </div>

            <div class="chart-box">
                <canvas id="lineChart"></canvas>
            </div>

            <div class="chart-box">
                <canvas id="pieChart"></canvas>
            </div>

            <div class="chart-box">
                <canvas id="doughnutChart"></canvas>
            </div>

        </div>

    </div>

    <script>
        let rows = [
            ["Month", "Sales"],
            ["Jan", 120],
            ["Feb", 190],
            ["Mar", 300],
            ["Apr", 250],
            ["May", 400]
        ];

        let charts = [];

        updateDashboard();


        // Search
        document.getElementById("searchBox")
            .addEventListener("keyup", function() {

                let value = this.value.toLowerCase();

                let filtered = rows.filter(r =>
                    r.join(" ").toLowerCase().includes(value)
                );

                createCharts(filtered);

            });


        // Upload CSV
        document.getElementById("fileInput")
            .addEventListener("change", function(e) {

                const file = e.target.files[0];

                const reader = new FileReader();

                reader.onload = function(event) {

                    rows = event.target.result
                        .trim()
                        .split("\n")
                        .map(r => r.split(","));

                    updateDashboard();
                };

                reader.readAsText(file);

            });


        // Sort
        function sortData() {

            let header = rows[0];

            let data = rows.slice(1);

            data.sort((a, b) => a[0].localeCompare(b[0]));

            rows = [header, ...data];

            updateDashboard();

        }


        // Dark Mode
        function toggleDark() {

            document.body.classList.toggle("dark");

        }


        // Reset
        function resetData() {

            updateDashboard();

        }


        // Statistics
        function calculateStats() {

            let values = rows.slice(1).map(r => Number(r[1]));

            document.getElementById("totalRows").textContent =
                values.length;

            document.getElementById("maxValue").textContent =
                Math.max(...values);

            document.getElementById("minValue").textContent =
                Math.min(...values);

            document.getElementById("avgValue").textContent =
                (
                    values.reduce((a, b) => a + b, 0) / values.length
                ).toFixed(2);

        }


        // Create Graphs
        function createCharts(data = rows) {

            charts.forEach(chart => chart.destroy());

            let labels = data.slice(1).map(r => r[0]);

            let values = data.slice(1).map(r => Number(r[1]));

            charts = [

                new Chart(document.getElementById("barChart"), {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Sales',
                            data: values
                        }]
                    }
                }),

                new Chart(document.getElementById("lineChart"), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Revenue',
                            data: values
                        }]
                    }
                }),

                new Chart(document.getElementById("pieChart"), {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values
                        }]
                    }
                }),

                new Chart(document.getElementById("doughnutChart"), {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values
                        }]
                    }
                })

            ];

        }


        // Update Dashboard
        function updateDashboard() {

            calculateStats();

            createCharts();

        }
    </script>

</body>

</html>
